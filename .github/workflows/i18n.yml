name: i18n audit
# Catches translation regressions BEFORE they reach production.
# Three checks per pull request:
#   1. Project builds (catches Next.js compile errors)
#   2. Build-time TypeScript passes (catches param signature changes etc)
#   3. i18n audit script verifies every route × locale has unique
#      <title>, <meta description>, <h1>

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Build (catches compile + Next 16 metadata route errors)
        run: npm run build
        env:
          # Build-time env — minimum needed to compile.
          NEXT_PUBLIC_SITE_URL: https://leorealtycapitalinvestments.com
          MLS_DATASET: test
          MLS_SERVER_TOKEN: ${{ secrets.MLS_SERVER_TOKEN || 'placeholder' }}
          MLS_BROWSER_TOKEN: ${{ secrets.MLS_BROWSER_TOKEN || 'placeholder' }}
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgres://placeholder' }}

      - name: Start production server
        run: |
          npm run start &
          # Wait for server to be ready (up to 60s)
          for i in $(seq 1 60); do
            if curl -s -o /dev/null -w "%{http_code}" "http://localhost:3000/" 2>/dev/null | grep -qE "^(200|308)$"; then
              echo "Server up after ${i}s"
              break
            fi
            sleep 1
          done
        env:
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
          MLS_DATASET: test
          MLS_SERVER_TOKEN: ${{ secrets.MLS_SERVER_TOKEN || 'placeholder' }}
          MLS_BROWSER_TOKEN: ${{ secrets.MLS_BROWSER_TOKEN || 'placeholder' }}
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgres://placeholder' }}

      - name: Run i18n audit
        run: AUDIT_BASE_URL=http://localhost:3000 npm run i18n:audit
